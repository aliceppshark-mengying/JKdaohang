<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JOINCOM · 聚客薪资系统</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
@font-face { font-family: 'Noto Sans SC'; src: local('Noto Sans SC'), local('PingFang SC'), local('Microsoft YaHei'); }
:root {
  --bg-page: #f5f3ef; --bg-card: #ffffff; --bg-header: #2c2825; --bg-hover: #f9f7f4;
  --bg-input: #fafaf8; --bg-section: #faf8f5;
  --fg: #2c2825; --fg2: #6b6560; --fg3: #9e9890; --fg4: #c5c0b8;
  --accent: #c0542e; --accent-bg: #fdf0eb; --accent-light: #e8c4b4;
  --blue: #2d6ca5; --blue-bg: #eaf1f8; --blue-fg: #1e4f7a;
  --green: #3a7d50; --green-bg: #eaf5ee; --green-fg: #275a38;
  --amber: #a87b20; --amber-bg: #fdf5e3; --amber-fg: #7a5a18;
  --red: #b53a30; --red-bg: #fceae8; --red-fg: #8a2a22;
  --border: #e8e4de; --border2: #d5d0c8;
  --shadow: 0 1px 3px rgba(44,40,37,0.06), 0 1px 2px rgba(44,40,37,0.04);
  --shadow-lg: 0 4px 12px rgba(44,40,37,0.08), 0 2px 4px rgba(44,40,37,0.04);
  --radius: 12px; --radius-sm: 8px; --radius-xs: 5px;
  --mono: 'JetBrains Mono', 'SF Mono', monospace;
  --sans: 'Noto Sans SC', 'PingFang SC', -apple-system, sans-serif;
  --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--sans); background: var(--bg-page); color: var(--fg); min-height: 100vh; -webkit-font-smoothing: antialiased; }

/* ─── Header ─── */
.header { background: var(--bg-header); color: #e8e4de; padding: 14px 32px; display: flex; justify-content: space-between; align-items: center; }
.header-left h1 { font-size: 15px; font-weight: 600; letter-spacing: 0.08em; color: #fff; }
.header-left h1 span { color: var(--accent-light); margin: 0 8px; font-weight: 400; }
.header-sub { font-family: var(--mono); font-size: 10px; letter-spacing: 0.15em; color: #8a8580; margin-top: 2px; text-transform: uppercase; }
.header-right { font-family: var(--mono); font-size: 12px; color: #8a8580; }

/* ─── Nav Tabs ─── */
.nav { background: var(--bg-card); border-bottom: 1px solid var(--border); padding: 0 32px; display: flex; gap: 0; }
.nav-tab { padding: 14px 20px; font-size: 13px; font-weight: 500; color: var(--fg3); cursor: pointer; border: none; background: none; font-family: var(--sans); position: relative; transition: var(--transition); display: flex; align-items: center; gap: 6px; }
.nav-tab:hover { color: var(--fg2); }
.nav-tab.active { color: var(--fg); }
.nav-tab.active::after { content: ''; position: absolute; bottom: 0; left: 20px; right: 20px; height: 2.5px; background: var(--accent); border-radius: 2px 2px 0 0; }
.nav-tab:disabled { opacity: 0.35; cursor: default; }
.nav-tab .tab-icon { font-size: 14px; }
.nav-badge { background: var(--accent); color: #fff; font-size: 10px; font-weight: 600; padding: 1px 6px; border-radius: 10px; margin-left: 2px; }

/* ─── Main Content ─── */
.main { max-width: 1060px; margin: 0 auto; padding: 28px 32px; }
.section-title { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
.section-desc { font-size: 13px; color: var(--fg3); margin-bottom: 24px; }

/* ─── Cards ─── */
.card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; }
.card-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: var(--bg-section); }
.card-header h3 { font-size: 14px; font-weight: 600; }

/* ─── Stat Cards ─── */
.stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 24px; }
.stat { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px 20px; box-shadow: var(--shadow); }
.stat-label { font-size: 11px; color: var(--fg3); letter-spacing: 0.04em; margin-bottom: 6px; }
.stat-val { font-size: 26px; font-weight: 700; font-family: var(--mono); letter-spacing: -0.02em; }
.stat-unit { font-size: 12px; font-weight: 400; margin-left: 2px; }
.stat-money { font-size: 20px; }

/* ─── Tables ─── */
table { width: 100%; border-collapse: collapse; font-size: 12px; }
thead th { padding: 10px 8px; text-align: center; font-weight: 600; font-size: 11px; color: var(--fg2); background: var(--bg-section); border-bottom: 1px solid var(--border); letter-spacing: 0.02em; white-space: nowrap; }
tbody td { padding: 8px 6px; text-align: center; border-bottom: 0.5px solid var(--border); vertical-align: middle; }
tbody tr { transition: var(--transition); }
tbody tr:hover { background: var(--bg-hover); }
tfoot td { padding: 12px 8px; font-weight: 700; background: var(--bg-section); border-top: 2px solid var(--border2); }

/* ─── Inputs ─── */
input[type="text"], input[type="number"], input[type="month"] {
  padding: 6px 10px; border-radius: var(--radius-xs); border: 1px solid var(--border);
  background: var(--bg-input); color: var(--fg); font-size: 12px; font-family: var(--sans);
  outline: none; transition: var(--transition);
}
input:focus { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-bg); }
input[type="number"] { text-align: right; font-family: var(--mono); }
.input-inline { width: 100%; padding: 4px 6px; font-size: 11px; }
.input-blue { color: var(--blue-fg); font-weight: 500; }

/* ─── Buttons ─── */
.btn { padding: 8px 18px; border-radius: var(--radius-sm); border: none; cursor: pointer; font-size: 13px; font-weight: 500; font-family: var(--sans); transition: var(--transition); display: inline-flex; align-items: center; gap: 6px; }
.btn:active { transform: scale(0.98); }
.btn-accent { background: var(--accent); color: #fff; }
.btn-accent:hover { background: #a84828; }
.btn-success { background: var(--green); color: #fff; padding: 14px 40px; font-size: 15px; border-radius: var(--radius); box-shadow: var(--shadow-lg); }
.btn-success:hover { background: #2d6940; }
.btn-outline { border: 1px solid var(--border2); background: var(--bg-card); color: var(--fg2); }
.btn-outline:hover { background: var(--bg-hover); }
.btn-sm { padding: 5px 12px; font-size: 12px; border-radius: var(--radius-xs); }
.btn-del { border: none; background: none; color: var(--fg4); cursor: pointer; font-size: 16px; transition: var(--transition); padding: 4px 8px; border-radius: 4px; }
.btn-del:hover { color: var(--red); background: var(--red-bg); }

/* ─── Badges ─── */
.badge { display: inline-block; padding: 3px 10px; border-radius: 4px; font-size: 10px; font-weight: 600; letter-spacing: 0.04em; font-family: var(--mono); }
.badge-info { background: var(--blue-bg); color: var(--blue-fg); }
.badge-ok { background: var(--green-bg); color: var(--green-fg); }
.badge-warn { background: var(--amber-bg); color: var(--amber-fg); }
.badge-err { background: var(--red-bg); color: var(--red-fg); }
.badge-tag { background: var(--accent-bg); color: var(--accent); border: 1px solid var(--accent-light); }

/* ─── Upload Zone ─── */
.upload-zone {
  border: 2px dashed var(--border2); border-radius: var(--radius); padding: 4rem 2rem;
  text-align: center; cursor: pointer; transition: var(--transition); background: var(--bg-card);
}
.upload-zone:hover { border-color: var(--accent-light); background: var(--accent-bg); }
.upload-zone.over { border-color: var(--accent); background: var(--accent-bg); }
.upload-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.7; }
.upload-title { font-size: 16px; font-weight: 600; margin-bottom: 6px; }
.upload-desc { font-size: 12px; color: var(--fg3); }
.upload-loaded { color: var(--green-fg); }

/* ─── Alerts ─── */
.alert { padding: 12px 16px; border-radius: var(--radius-sm); font-size: 12px; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
.alert-warn { background: var(--amber-bg); color: var(--amber-fg); border: 1px solid #e8d5a0; }
.alert-info { background: var(--blue-bg); color: var(--blue-fg); border: 1px solid #b0cde8; }

/* ─── Detail Panel ─── */
.detail-panel { padding: 16px 20px; background: var(--bg-section); border-top: 1px solid var(--border); }
.detail-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(175px, 1fr)); gap: 8px; }
.detail-item { padding: 8px 12px; border-radius: var(--radius-xs); font-size: 11px; border: 1px solid var(--border); background: var(--bg-card); display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.detail-item.flag { border-color: var(--amber-fg); background: var(--amber-bg); }
.detail-date { font-weight: 600; font-family: var(--mono); font-size: 11px; }
.detail-time { color: var(--fg2); font-family: var(--mono); font-size: 11px; }

/* ─── Config Bar ─── */
.config-bar { display: flex; gap: 20px; margin-bottom: 24px; flex-wrap: wrap; align-items: center; padding: 14px 20px; background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); }
.config-label { font-size: 12px; color: var(--fg2); margin-right: 6px; }

/* ─── Export Area ─── */
.export-area { margin-top: 32px; text-align: center; padding: 32px; background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); }
.export-hint { font-size: 11px; color: var(--fg3); margin-top: 10px; }

/* ─── Footer ─── */
.nav-bar { display: flex; justify-content: space-between; margin-top: 28px; }

/* ─── Animations ─── */
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.animate-in { animation: fadeIn 0.3s ease-out; }

@media (max-width: 768px) {
  .header { padding: 12px 16px; }
  .nav { padding: 0 16px; overflow-x: auto; }
  .main { padding: 20px 16px; }
  .stats { grid-template-columns: repeat(2, 1fr); }
  .config-bar { flex-direction: column; align-items: stretch; gap: 12px; }
}
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="header-left">
    <h1>JOINCOM<span>·</span>聚客薪资系统</h1>
    <div class="header-sub">PAYROLL MANAGEMENT SYSTEM v1.0</div>
  </div>
  <div class="header-right" id="header-date"></div>
</div>

<!-- Nav -->
<div class="nav" id="nav"></div>

<!-- Main -->
<div class="main animate-in" id="main"></div>

<script>
// ─── Date display ───
const now = new Date();
document.getElementById('header-date').textContent = `${now.getFullYear()}/${now.getMonth()+1}/${now.getDate()} ${['日','一','二','三','四','五','六'][now.getDay()]}`;

// ─── State ───
let S = {
  step: 0,
  employees: JSON.parse(localStorage.getItem('jk-emp2') || '[]'),
  att: null,
  month: new Date().toISOString().slice(0,7),
  days: 22,
  csvName: '',
  expanded: null,
};
function set(p) { Object.assign(S, p); if(p.employees!==undefined) localStorage.setItem('jk-emp2',JSON.stringify(S.employees)); render(); }

// ─── CSV ───
const LT = 605, WS = 600;
function parseCSV(t) {
  const r = Papa.parse(t,{skipEmptyLines:true}), d={}, info={};
  for(let i=1;i<r.data.length;i++){
    const row=r.data[i]; if(row.length<4) continue;
    const id=(row[0]||'').replace(/'/g,'').trim(), nm=(row[1]||'').trim(), dp=(row[2]||'').trim(), dt=(row[3]||'').trim();
    const m=dt.match(/(\d{4}-\d{2}-\d{2})\s+(\d{2}:\d{2}:\d{2})/); if(!m||!id) continue;
    info[id]={name:nm,dept:dp}; const k=id+'|'+m[1]; if(!d[k]) d[k]=[]; d[k].push(m[2]);
  }
  const s={};
  for(const[k,times] of Object.entries(d)){
    const[eid,date]=k.split('|'); times.sort();
    const f=times[0],l=times[times.length-1];
    const[h1,m1]=f.split(':').map(Number),[h2,m2]=l.split(':').map(Number);
    const inM=h1*60+m1, outM=h2*60+m2;
    if(!s[eid]) s[eid]={...info[eid],days:0,late:0,early:0,details:[],pL:0,sL:0,aL:0};
    s[eid].days++; const isL=inM>LT, isE=outM<inM+WS&&times.length>1;
    if(isL) s[eid].late++; if(isE) s[eid].early++;
    s[eid].details.push({date,first:f,last:l,isLate:isL,isEarly:isE,n:times.length});
  }
  return s;
}

// ─── Export ───
function exportXL(){
  const{employees:E,att:A,month:M,days:D}=S, wb=XLSX.utils.book_new(), fm=v=>(v||0).toFixed(2);
  const p=[['广州聚客网络科技有限公司工资表'],['工资所属月份：'+M],
    ['序号','姓名','身份证','基本工资','绩效工资','月度奖金','加班补贴','其他补贴','应发总额','缺勤扣款','其他扣款','代扣社保','住房公积金','应扣合计','本月应发','个人所得税','本月实发','团队','备注']];
  let tG=0,tD=0,tN=0,tA=0;
  E.forEach((e,i)=>{
    const a=A?.[e.aid]||{}, ab=Math.max(0,D-(a.days||0)-(a.aL||0)-(a.sL||0)-(a.pL||0));
    const dr=((e.base||0)+(e.perf||0))/21.75, ad=Math.round(ab*dr*100)/100;
    const g=(e.base||0)+(e.perf||0)+(e.bonus||0)+(e.ot||0)+(e.allow||0);
    const d=ad+(e.othD||0)+(e.ss||0)+(e.hf||0), n=g-d, ac=n-(e.tax||0);
    tG+=g;tD+=d;tN+=n;tA+=ac;
    const notes=(a.details||[]).filter(x=>x.isLate||x.isEarly).map(x=>x.date+(x.isLate?'迟到':'早退')).join('; ');
    p.push([i+1,e.name,e.idc||'',e.base,e.perf,e.bonus||0,e.ot||0,e.allow||0,g,ad,e.othD||0,e.ss,e.hf,d,n,e.tax||0,ac,e.team||'',notes]);
  });
  p.push(['合计','','','','','','','',tG,'','','','',tD,tN,'',tA]);
  p.push([]);p.push(['制表人：________________     财务经理复核：________________     总经理审批：________________']);
  const ws1=XLSX.utils.aoa_to_sheet(p);
  ws1['!cols']=[{wch:5},{wch:10},{wch:20},{wch:10},{wch:10},{wch:10},{wch:10},{wch:10},{wch:12},{wch:10},{wch:10},{wch:10},{wch:10},{wch:12},{wch:12},{wch:10},{wch:12},{wch:10},{wch:30}];
  XLSX.utils.book_append_sheet(wb,ws1,'工资表');
  const a2=[['考勤汇总'],['数据月份：'+M+'  应出勤天数：'+D],['序号','考勤编号','姓名','应出勤','实出勤','缺勤','迟到','早退','事假','病假','年假','日薪基数','缺勤扣款','备注']];
  E.forEach((e,i)=>{const a=A?.[e.aid]||{},ab=Math.max(0,D-(a.days||0)-(a.aL||0)-(a.sL||0)-(a.pL||0)),dr=Math.round(((e.base||0)+(e.perf||0))/21.75*100)/100,ad=Math.round(ab*dr*100)/100;
    const notes=(a.details||[]).filter(x=>x.isLate||x.isEarly).map(x=>x.date+(x.isLate?'迟到('+x.first+')':'早退('+x.last+')')).join('; ');
    a2.push([i+1,e.aid,e.name,D,a.days||0,ab,a.late||0,a.early||0,a.pL||0,a.sL||0,a.aL||0,dr,ad,notes]);
  });
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(a2),'考勤汇总');
  XLSX.writeFile(wb,'聚客工资表_'+M+'.xlsx');
}

// ─── DOM helpers ───
function h(t,a,...c){const el=document.createElement(t);if(a)for(const[k,v]of Object.entries(a)){if(k==='style'&&typeof v==='object')Object.assign(el.style,v);else if(k.startsWith('on'))el.addEventListener(k.slice(2).toLowerCase(),v);else if(k==='className')el.className=v;else if(k==='innerHTML')el.innerHTML=v;else el.setAttribute(k,v);}for(const x of c){if(x==null||x===false)continue;if(Array.isArray(x))x.forEach(i=>i&&el.appendChild(typeof i==='string'?document.createTextNode(i):i));else el.appendChild(typeof x==='string'?document.createTextNode(x):x);}return el;}
function badge(t,c){return h('span',{className:'badge badge-'+c},t);}
function inp(v,fn,type='text',cls='',sty={}){const i=h('input',{type,value:v??'',className:cls,style:sty});i.addEventListener('input',e=>fn(type==='number'?(parseFloat(e.target.value)||0):e.target.value));return i;}

// ─── Tab renderers ───
function renderNav(){
  const nav=document.getElementById('nav'); nav.innerHTML='';
  const tabs=[['📊','员工底表'],['📄','导入考勤'],['✅','考勤审核'],['💰','工资表']];
  const mx=S.att?3:S.employees.length>0?1:0;
  tabs.forEach(([ic,lb],i)=>{
    const btn=h('button',{className:'nav-tab'+(i===S.step?' active':''),disabled:i>mx},
      h('span',{className:'tab-icon'},ic), lb);
    if(i<=mx) btn.onclick=()=>set({step:i});
    nav.appendChild(btn);
  });
}

// ─── Employee Import Logic ───
function parseEmployeeFile(file) {
  const ext = file.name.toLowerCase().split('.').pop();
  const reader = new FileReader();

  if (ext === 'csv') {
    const tryRead = (enc) => {
      const r = new FileReader();
      r.onload = e => {
        const parsed = Papa.parse(e.target.result, { skipEmptyLines: true });
        importEmployeeRows(parsed.data, file.name);
      };
      r.readAsText(file, enc);
    };
    reader.onload = e => {
      const t = e.target.result;
      if (t.includes('\ufffd')) tryRead('GBK'); else importEmployeeRows(Papa.parse(t, { skipEmptyLines: true }).data, file.name);
    };
    reader.readAsText(file, 'UTF-8');
  } else {
    reader.onload = e => {
      const wb = XLSX.read(e.target.result, { type: 'array' });
      const ws = wb.Sheets[wb.SheetNames[0]];
      const data = XLSX.utils.sheet_to_json(ws, { header: 1 });
      importEmployeeRows(data, file.name);
    };
    reader.readAsArrayBuffer(file);
  }
}

function importEmployeeRows(data, fileName) {
  if (!data || data.length < 2) { alert('文件为空或格式不正确'); return; }

  // Find header row by looking for '姓名'
  let headerIdx = -1, headerRow = [];
  for (let i = 0; i < Math.min(10, data.length); i++) {
    const row = (data[i] || []).map(c => String(c || '').trim());
    if (row.some(c => c === '姓名')) { headerIdx = i; headerRow = row; break; }
  }
  if (headerIdx === -1) { alert('未找到包含「姓名」的表头行，请检查文件格式'); return; }

  // Map columns by fuzzy matching
  const colMap = {};
  const mapping = [
    ['name', ['姓名']],
    ['aid', ['考勤编号', '编号', '工号', '员工编号']],
    ['idc', ['身份证', '身份证号', '身份证号码', '证件号']],
    ['team', ['团队', '部门', '所属团队']],
    ['base', ['基本工资', '基本', '底薪', '基薪']],
    ['perf', ['绩效工资', '绩效', '绩效薪资']],
    ['allow', ['补贴', '其他补贴', '津贴', '其他津贴']],
    ['ss', ['社保', '代扣社保', '社会保险', '个人社保']],
    ['hf', ['公积金', '住房公积金', '个人公积金']],
  ];

  headerRow.forEach((col, ci) => {
    for (const [key, keywords] of mapping) {
      if (keywords.some(kw => col.includes(kw)) && !colMap[key]) {
        colMap[key] = ci;
        break;
      }
    }
  });

  if (colMap.name === undefined) { alert('未能识别「姓名」列，请检查表头'); return; }

  // Parse data rows
  const newEmps = [];
  for (let i = headerIdx + 1; i < data.length; i++) {
    const row = data[i] || [];
    const name = String(row[colMap.name] || '').trim();
    if (!name || name === '合计' || name === '小计' || name.includes('合计')) continue;

    const emp = { name, aid: '', idc: '', team: '', base: 0, perf: 0, allow: 0, ss: 0, hf: 0, bonus: 0, tax: 0, ot: 0, othD: 0 };
    for (const [key, ci] of Object.entries(colMap)) {
      if (key === 'name') continue;
      const val = row[ci];
      if (['base','perf','allow','ss','hf'].includes(key)) {
        emp[key] = parseFloat(val) || 0;
      } else {
        emp[key] = String(val || '').replace(/'/g, '').trim();
      }
    }
    newEmps.push(emp);
  }

  if (newEmps.length === 0) { alert('未能解析到有效员工数据'); return; }

  // Merge: add new, don't duplicate by name
  const existing = S.employees.map(e => e.name);
  const toAdd = newEmps.filter(e => !existing.includes(e.name));
  const merged = [...S.employees, ...toAdd];

  const matchedCols = Object.keys(colMap).map(k => mapping.find(m => m[0] === k)?.[1][0]).filter(Boolean);
  set({ employees: merged });
  alert(`导入完成！\n\n文件：${fileName}\n识别列：${matchedCols.join('、')}\n新增员工：${toAdd.length} 人${existing.length ? '\n已有员工：' + existing.length + ' 人（跳过重复）' : ''}\n\n总计：${merged.length} 人`);
}

function handleEmployeePaste(e) {
  const text = e.clipboardData.getData('text');
  if (!text || !text.includes('\t')) return; // Not tabular data
  e.preventDefault();
  const rows = text.trim().split('\n').map(r => r.split('\t'));
  importEmployeeRows(rows, '粘贴数据');
}

  ];
  const ws = XLSX.utils.aoa_to_sheet(tmpl);

function renderStep1(){
  const zone=h('div',{className:'upload-zone',id:'dz'},
    h('div',{className:'upload-icon'},'📋'),
    h('div',{className:'upload-title'+(S.csvName?' upload-loaded':'')},S.csvName?'✓ 已加载：'+S.csvName:'将考勤CSV拖到这里，或点击选择文件'),
    h('div',{className:'upload-desc'},'支持IFC考勤系统导出格式，GBK / UTF-8 编码自动识别'));

function doFile(f){
  if(!f)return; set({csvName:f.name});
  const go=t=>{try{const r=parseCSV(t);if(!Object.keys(r).length){alert('未解析到有效打卡数据');return;}set({att:r,step:2});}catch(e){alert('解析失败：'+e.message);}};
  const rd=new FileReader();
  rd.onload=e=>{const t=e.target.result;if(t.includes('\ufffd')){const r2=new FileReader();r2.onload=e2=>go(e2.target.result);r2.readAsText(f,'GBK');}else go(t);};
  rd.readAsText(f,'UTF-8');
}

      h('td',{style:{padding:'3px'}},inp(a.pL||0,v=>{A[e.aid].pL=v;set({att:{...A}});},'number','input-inline',{width:'45px',textAlign:'center'})),
      h('td',{style:{padding:'3px'}},inp(a.sL||0,v=>{A[e.aid].sL=v;set({att:{...A}});},'number','input-inline',{width:'45px',textAlign:'center'})),
      h('td',{style:{padding:'3px'}},inp(a.aL||0,v=>{A[e.aid].aL=v;set({att:{...A}});},'number','input-inline',{width:'45px',textAlign:'center'})),
      h('td',null,a.days===undefined?badge('无记录','err'):ab>0?badge('缺勤','err'):a.late>0?badge('迟到','warn'):badge('正常','ok'))
    );
    tr.onclick=ev=>{if(ev.target.tagName==='INPUT')return;set({expanded:S.expanded===e.aid?null:e.aid});};
    trs.push(tr);
    if(S.expanded===e.aid&&a.details){
      trs.push(h('tr',null,h('td',{colSpan:10,style:{padding:0}},
        h('div',{className:'detail-panel'},h('div',{className:'detail-grid'},
          ...a.details.map(d=>h('div',{className:'detail-item'+(d.isLate||d.isEarly?' flag':'')},
            h('span',{className:'detail-date'},d.date),h('span',{className:'detail-time'},d.first+' → '+d.last),
            d.isLate?badge('迟到','warn'):null,d.isEarly?badge('早退','warn'):null)))))));
    }
  });

  els.push(h('div',{className:'card'},h('table',null,
    h('thead',null,h('tr',null,...['姓名','应出勤','实出勤','缺勤','迟到','早退','事假','病假','年假','状态'].map(t=>h('th',null,t)))),
    h('tbody',null,...trs))));
  return h('div',{className:'animate-in'},...els);

function renderStep3(){

      h('tbody',null,...rows.map(r=>h('tr',null,
        h('td',{style:{fontWeight:600,textAlign:'left',paddingLeft:'12px'}},r.name),

        h('td',{style:{fontFamily:'var(--mono)'}},fm(r.perf)),
        h('td',{style:{padding:'3px'}},inp(r.bonus,v=>{const es=[...S.employees];es[r.i]={...es[r.i],bonus:v};set({employees:es});},'number','input-inline input-blue',{width:'72px',padding:'5px 6px'})),
        h('td',{style:{fontFamily:'var(--mono)'}},fm(r.allow)),
        h('td',{style:{fontWeight:600,fontFamily:'var(--mono)'}},fm(r.g)),
        h('td',{style:{color:r.ad>0?'var(--red-fg)':'',fontFamily:'var(--mono)'}},fm(r.ad)),
        h('td',{style:{fontFamily:'var(--mono)'}},fm(r.ss)),
        h('td',{style:{fontFamily:'var(--mono)'}},fm(r.hf)),
        h('td',{style:{fontWeight:600,fontFamily:'var(--mono)'}},fm(r.d)),
        h('td',{style:{fontWeight:600,color:'var(--blue-fg)',fontFamily:'var(--mono)'}},fm(r.n)),
        h('td',{style:{padding:'3px'}},inp(r.tax,v=>{const es=[...S.employees];es[r.i]={...es[r.i],tax:v};set({employees:es});},'number','input-inline input-blue',{width:'72px',padding:'5px 6px'})),
        h('td',{style:{fontWeight:700,fontSize:'13px',color:'var(--green-fg)',fontFamily:'var(--mono)'}},fm(r.ac))))),
      h('tfoot',null,h('tr',null,h('td',{style:{textAlign:'left',paddingLeft:'12px'}},'合计'),h('td',{colSpan:4}),h('td',{style:{fontFamily:'var(--mono)'}},fm(tG)),h('td',{colSpan:3}),h('td',{style:{fontFamily:'var(--mono)'}},fm(tD)),h('td',{style:{color:'var(--blue-fg)',fontFamily:'var(--mono)'}},fm(tN)),h('td'),h('td',{style:{fontSize:'14px',color:'var(--green-fg)',fontFamily:'var(--mono)'}},'¥'+fm(tA))))))),
    h('div',{className:'export-area'},expBtn,h('p',{className:'export-hint'},'生成包含「工资表」+「考勤汇总」两个工作表的标准Excel文件'))
  );

function render(){
  renderNav();
  const m=document.getElementById('main'); m.innerHTML='';
  if(S.step===0) m.appendChild(renderStep0());
  else if(S.step===1) m.appendChild(renderStep1());
  else if(S.step===2) m.appendChild(renderStep2());
  else m.appendChild(renderStep3());

  // Nav bar
  const nb=document.createElement('div'); nb.className='nav-bar';
  const mx=S.att?3:S.employees.length>0?1:0;
  const prev=h('button',{className:'btn btn-outline',disabled:S.step===0},'← 上一步');
  if(S.step>0) prev.onclick=()=>set({step:S.step-1});
  const next=h('button',{className:'btn btn-accent',disabled:S.step>=3||S.step>=mx},'下一步 →');
  if(S.step===0&&S.employees.length>0){next.disabled=false;next.onclick=()=>set({step:1});}
  else if(S.step<3&&S.step<mx) next.onclick=()=>set({step:S.step+1});
  nb.appendChild(prev); if(S.step<3) nb.appendChild(next);
  m.appendChild(nb);
}

render();
